<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <!-- Ivory tusk gradients -->
    <linearGradient id="tuskL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ede5d0"/>
      <stop offset="55%"  stop-color="#c8bfa8"/>
      <stop offset="100%" stop-color="#8a7d62"/>
    </linearGradient>
    <linearGradient id="tuskR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ede5d0"/>
      <stop offset="55%"  stop-color="#c8bfa8"/>
      <stop offset="100%" stop-color="#8a7d62"/>
    </linearGradient>

    <!-- Layer fill gradients -->
    <linearGradient id="langBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0f1f0f"/>
      <stop offset="100%" stop-color="#081408"/>
    </linearGradient>
    <linearGradient id="tuskLayerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1c0303"/>
      <stop offset="100%" stop-color="#0d0101"/>
    </linearGradient>
    <linearGradient id="libtskBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#05101c"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>

    <!-- Badge panel background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>

    <!-- Red rim glow -->
    <filter id="rimGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to inner hex so layers don't bleed out -->
    <clipPath id="hexClip">
      <polygon points="485,260 370,454 150,454 35,260 150,66 370,66"/>
    </clipPath>
  </defs>

  <!-- ══ CANVAS BACKGROUND ══ -->
  <rect width="520" height="520" fill="#060606"/>

  <!-- ══ OUTER HEXAGON (flat-top, R=238, center 260,260) ══ -->
  <polygon points="498,260 379,466 141,466 22,260 141,54 379,54"
    fill="none" stroke="#cc2200" stroke-width="3.5" filter="url(#rimGlow)"/>

  <!-- ══ INNER PANEL FILL ══ -->
  <polygon points="485,260 370,454 150,454 35,260 150,66 370,66"
    fill="url(#bgGrad)"/>

  <!-- ══ FAINT CROSSHAIR GRID ══ -->
  <g clip-path="url(#hexClip)">
    <line x1="141" y1="54"  x2="379" y2="466" stroke="#cc2200" stroke-width="0.6" opacity="0.10"/>
    <line x1="379" y1="54"  x2="141" y2="466" stroke="#cc2200" stroke-width="0.6" opacity="0.10"/>
    <line x1="22"  y1="260" x2="498" y2="260" stroke="#cc2200" stroke-width="0.6" opacity="0.10"/>
  </g>

  <!-- ══ DASHED INNER HEX OUTLINE ══ -->
  <polygon points="470,260 360,447 140,447 50,260 140,73 360,73"
    fill="none" stroke="#661100" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ══ TACTICAL NOTCH MARKS ══ -->
  <!-- top edge -->
  <line x1="228" y1="58"  x2="234" y2="68"  stroke="#cc2200" stroke-width="2"/>
  <line x1="260" y1="54"  x2="260" y2="66"  stroke="#cc2200" stroke-width="2"/>
  <line x1="292" y1="58"  x2="286" y2="68"  stroke="#cc2200" stroke-width="2"/>
  <!-- bottom edge -->
  <line x1="228" y1="462" x2="234" y2="452" stroke="#cc2200" stroke-width="2"/>
  <line x1="260" y1="466" x2="260" y2="454" stroke="#cc2200" stroke-width="2"/>
  <line x1="292" y1="462" x2="286" y2="452" stroke="#cc2200" stroke-width="2"/>
  <!-- side ticks -->
  <line x1="22"  y1="245" x2="34"  y2="245" stroke="#cc2200" stroke-width="2"/>
  <line x1="22"  y1="275" x2="34"  y2="275" stroke="#cc2200" stroke-width="2"/>
  <line x1="498" y1="245" x2="486" y2="245" stroke="#cc2200" stroke-width="2"/>
  <line x1="498" y1="275" x2="486" y2="275" stroke="#cc2200" stroke-width="2"/>
  <!-- corner triangle accents -->
  <polygon points="379,54  369,62  389,62"  fill="#661100" opacity="0.7"/>
  <polygon points="141,54  131,62  151,62"  fill="#661100" opacity="0.7"/>
  <polygon points="498,260 486,252 486,268" fill="#661100" opacity="0.7"/>
  <polygon points="22,260  34,252  34,268"  fill="#661100" opacity="0.7"/>
  <polygon points="379,466 389,458 369,458" fill="#661100" opacity="0.7"/>
  <polygon points="141,466 151,458 131,458" fill="#661100" opacity="0.7"/>

  <!-- ══ TOP BRIDGE LABEL ══ -->
  <text x="260" y="96"
    font-family="'Arial Narrow',Arial,sans-serif" font-size="9.5"
    fill="#882211" text-anchor="middle" letter-spacing="5.5" font-weight="bold">
    ◆  FORENSIC  BRIDGE  LAYER  ◆
  </text>

  <!-- ════════════════════════════════════════════════════
       LAYER 1 — CALLER LANGUAGES   (y 106 → 148)
       ════════════════════════════════════════════════════ -->
  <rect x="118" y="106" width="284" height="42" rx="3"
    fill="url(#langBg)" stroke="#2a5c2a" stroke-width="1.2"/>
  <!-- corner bracket marks -->
  <polyline points="118,118 118,106 130,106" fill="none" stroke="#44aa44" stroke-width="1.5"/>
  <polyline points="390,106 402,106 402,118" fill="none" stroke="#44aa44" stroke-width="1.5"/>
  <polyline points="118,136 118,148 130,148" fill="none" stroke="#44aa44" stroke-width="1.5"/>
  <polyline points="390,148 402,148 402,136" fill="none" stroke="#44aa44" stroke-width="1.5"/>
  <!-- tier label -->
  <text x="126" y="121"
    font-family="'Courier New',monospace" font-size="7"
    fill="#2a6a2a" letter-spacing="1">CALLER</text>
  <!-- language list -->
  <text x="260" y="135"
    font-family="'Courier New',monospace" font-size="11"
    fill="#55cc55" text-anchor="middle" letter-spacing="3" filter="url(#glow)">
    Go · Rust · Python · C# · Java
  </text>

  <!-- ════════════════════════════════════════════════════
       CONNECTOR  LANG → TUSK  (y 148 → 180)
       ════════════════════════════════════════════════════ -->
  <!-- flow lines + arrowheads -->
  <line x1="183" y1="148" x2="183" y2="174" stroke="#cc4400" stroke-width="1" opacity="0.75"/>
  <line x1="218" y1="148" x2="218" y2="174" stroke="#cc4400" stroke-width="1" opacity="0.75"/>
  <line x1="260" y1="148" x2="260" y2="174" stroke="#cc4400" stroke-width="1" opacity="0.75"/>
  <line x1="302" y1="148" x2="302" y2="174" stroke="#cc4400" stroke-width="1" opacity="0.75"/>
  <line x1="337" y1="148" x2="337" y2="174" stroke="#cc4400" stroke-width="1" opacity="0.75"/>
  <polygon points="183,178 179,170 187,170" fill="#cc4400"/>
  <polygon points="218,178 214,170 222,170" fill="#cc4400"/>
  <polygon points="260,178 256,170 264,170" fill="#cc4400"/>
  <polygon points="302,178 298,170 306,170" fill="#cc4400"/>
  <polygon points="337,178 333,170 341,170" fill="#cc4400"/>
  <!-- zone label -->
  <text x="260" y="169"
    font-family="'Courier New',monospace" font-size="8"
    fill="#7a3311" text-anchor="middle" letter-spacing="3">FFI · CGO · C ABI</text>

  <!-- ════════════════════════════════════════════════════
       LAYER 2 — TUSK WRAPPER   (y 180 → 308)
       ════════════════════════════════════════════════════ -->
  <rect x="100" y="180" width="320" height="128" rx="3"
    fill="url(#tuskLayerBg)" stroke="#cc2200" stroke-width="2"/>
  <!-- tier label -->
  <text x="108" y="195"
    font-family="'Courier New',monospace" font-size="7"
    fill="#551100" letter-spacing="1">WRAPPER</text>

  <!-- LEFT TUSK — flanks left edge of TUSK layer, base at bottom, tip curves up-left -->
  <path d="
    M 112,308
    C 110,292 104,268  96,244
    C  88,220  84,200  90,185
    C  93,178  98,175 103,175
    L 104,175
    C 100,182  98,196 104,216
    C 112,242 118,266 120,290
    C 121,299 121,306 120,310
    Z"
    fill="url(#tuskL)" stroke="#a09070" stroke-width="0.8"/>

  <!-- RIGHT TUSK — mirror -->
  <path d="
    M 408,308
    C 410,292 416,268 424,244
    C 432,220 436,200 430,185
    C 427,178 422,175 417,175
    L 416,175
    C 420,182 422,196 416,216
    C 408,242 402,266 400,290
    C 399,299 399,306 400,310
    Z"
    fill="url(#tuskR)" stroke="#a09070" stroke-width="0.8"/>

  <!-- TUSK WORDMARK -->
  <text x="260" y="266"
    font-family="'Arial Black','Impact',sans-serif" font-size="66" font-weight="900"
    fill="#ede5d0" text-anchor="middle" letter-spacing="10"
    dominant-baseline="middle" filter="url(#glow)">TUSK</text>

  <!-- C ABI wrapper subtitle -->
  <text x="260" y="298"
    font-family="'Arial Narrow',Arial,sans-serif" font-size="8.5"
    fill="#883322" text-anchor="middle" letter-spacing="5">
    C  ABI  ·  WRAPPER  ·  BRIDGE
  </text>

  <!-- ════════════════════════════════════════════════════
       CONNECTOR  TUSK → libtsk  (y 308 → 338)
       ════════════════════════════════════════════════════ -->
  <line x1="183" y1="308" x2="183" y2="332" stroke="#2255aa" stroke-width="1" opacity="0.75"/>
  <line x1="218" y1="308" x2="218" y2="332" stroke="#2255aa" stroke-width="1" opacity="0.75"/>
  <line x1="260" y1="308" x2="260" y2="332" stroke="#2255aa" stroke-width="1" opacity="0.75"/>
  <line x1="302" y1="308" x2="302" y2="332" stroke="#2255aa" stroke-width="1" opacity="0.75"/>
  <line x1="337" y1="308" x2="337" y2="332" stroke="#2255aa" stroke-width="1" opacity="0.75"/>
  <polygon points="183,336 179,328 187,328" fill="#2255aa"/>
  <polygon points="218,336 214,328 222,328" fill="#2255aa"/>
  <polygon points="260,336 256,328 264,328" fill="#2255aa"/>
  <polygon points="302,336 298,328 306,328" fill="#2255aa"/>
  <polygon points="337,336 333,328 341,328" fill="#2255aa"/>
  <!-- zone label -->
  <text x="260" y="326"
    font-family="'Courier New',monospace" font-size="8"
    fill="#223366" text-anchor="middle" letter-spacing="3">native  ·  syscalls</text>

  <!-- ════════════════════════════════════════════════════
       LAYER 3 — libtsk FOUNDATION   (y 336 → 378)
       ════════════════════════════════════════════════════ -->
  <rect x="118" y="336" width="284" height="42" rx="3"
    fill="url(#libtskBg)" stroke="#1a3a6a" stroke-width="1.2"/>
  <!-- corner brackets -->
  <polyline points="118,348 118,336 130,336" fill="none" stroke="#4477cc" stroke-width="1.5"/>
  <polyline points="390,336 402,336 402,348" fill="none" stroke="#4477cc" stroke-width="1.5"/>
  <polyline points="118,366 118,378 130,378" fill="none" stroke="#4477cc" stroke-width="1.5"/>
  <polyline points="390,378 402,378 402,366" fill="none" stroke="#4477cc" stroke-width="1.5"/>
  <!-- tier label -->
  <text x="126" y="351"
    font-family="'Courier New',monospace" font-size="7"
    fill="#1a3a6a" letter-spacing="1">FOUNDATION</text>
  <!-- libtsk + zlib -->
  <text x="260" y="364"
    font-family="'Courier New',monospace" font-size="14"
    fill="#5588cc" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    libtsk  ·  zlib
  </text>

  <!-- ════════════════════════════════════════════════════
       BOTTOM — chevrons + tagline
       ════════════════════════════════════════════════════ -->
  <polyline points="222,400 260,390 298,400"
    fill="none" stroke="#cc2200" stroke-width="2.2" stroke-linejoin="miter"/>
  <polyline points="227,408 260,398 293,408"
    fill="none" stroke="#661100" stroke-width="1.3" stroke-linejoin="miter"/>

  <text x="260" y="430"
    font-family="'Arial Narrow',Arial,sans-serif" font-size="10"
    fill="#882211" text-anchor="middle" letter-spacing="5.5">
    DISK  FORENSICS  TOOLKIT
  </text>

  <!-- ══ TOP DIAMOND ACCENT ══ -->
  <polygon points="260,78 267,88 260,98 253,88" fill="#cc2200"/>
</svg>
